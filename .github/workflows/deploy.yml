name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy.yml'
    paths-ignore:
      - 'packages/ruam/**'

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: bun install

      # Build ruam + collect stats so the site always includes stats.json
      - run: bun run build:lib
      - run: bun run test
      - run: bun run stats
      - name: Copy stats.json into site
        run: cp packages/ruam/stats.json apps/web/public/stats.json

      # Build browser worker bundle for the playground
      - name: Build browser worker bundle
        run: bun run build:worker

      - run: bun run build:web

      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/out

      - id: deployment
        uses: actions/deploy-pages@v4
