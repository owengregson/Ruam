name: CI

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - 'packages/ruam/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/ruam/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: bun install

      - run: bun run build:lib
      - run: bun run typecheck
      - run: bun run test
      - run: bun run stats

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: stats
          path: packages/ruam/stats.json

      # Publish stats.json to GitHub Pages alongside the Next.js site
      - name: Copy stats.json into site
        if: github.ref == 'refs/heads/main'
        run: cp packages/ruam/stats.json apps/web/public/stats.json

      # Build browser worker bundle for the playground
      - name: Build browser worker bundle
        if: github.ref == 'refs/heads/main'
        run: bun run build:worker

      - name: Build site with stats
        if: github.ref == 'refs/heads/main'
        run: bun run build:web

      - uses: actions/upload-pages-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          path: apps/web/out

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-pages
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
