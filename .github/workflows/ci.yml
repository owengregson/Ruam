name: CI

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - 'packages/ruam/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/ruam/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # macOS-generated lockfile doesn't resolve Linux optional deps (npm/cli#4828).
      - name: Fix rollup platform binary
        run: |
          ROLLUP_V=$(node -p "require('./node_modules/rollup/package.json').version")
          npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_V}"

      # Single turbo invocation: build → typecheck+test (parallel) → stats
      - run: npx turbo run build typecheck test stats --filter=ruam

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: stats
          path: packages/ruam/stats.json

      # Publish stats.json to GitHub Pages alongside the Next.js site
      - name: Copy stats.json into site
        if: github.ref == 'refs/heads/main'
        run: cp packages/ruam/stats.json apps/web/public/stats.json

      - name: Build site with stats
        if: github.ref == 'refs/heads/main'
        run: npx turbo run build --filter=web

      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: apps/web/out

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-pages
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
