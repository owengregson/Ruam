name: CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/ruam/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/ruam/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Stats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci can miss platform-specific optional dependencies in workspaces
      # (https://github.com/npm/cli/issues/4828). npm install handles this correctly.
      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npx turbo run build --filter=ruam

      - name: Typecheck
        run: npx turbo run typecheck --filter=ruam

      - name: Run tests
        run: npx turbo run test --filter=ruam

      - name: Collect stats
        run: npx turbo run stats --filter=ruam

      - name: Upload stats artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: stats
          path: packages/ruam/stats.json
